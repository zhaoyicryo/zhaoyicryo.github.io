name: Deploy site

on:
  push:
    branches:
      - main
      - master
      - "**/*.md"
      - "**/*.html"
      - "**/*.yml"
      - "assets/**"
      - "_sass/**"
      - "_scripts/**"
      - "Gemfile"
      - "Gemfile.lock"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      # 2. Set up Ruby for Jekyll
      - name: Setup Ruby 💎
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3.5"
          bundler-cache: true

      # 3. Set up Python (for nbconvert or other scripts if needed)
      - name: Setup Python 🐍
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      # 4. Install dependencies
      - name: Install Dependencies 🔧
        run: |
          sudo apt-get update && sudo apt-get install -y imagemagick
          pip3 install --upgrade nbconvert
          bundle install

      # 5. Build Jekyll site
      - name: Build Jekyll Site 🏗️
        run: |
          export JEKYLL_ENV=production
          bundle exec jekyll build

      # 6. Purge unused CSS (optional)
      - name: Purge unused CSS 🧹
        run: |
          npm install -g purgecss
          purgecss -c purgecss.config.js || echo "No purgecss config, skipping"

      # 7. Deploy to GitHub Pages
      - name: Deploy 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: _site
          clean: true
          commit-message: "Deploy updated site [skip ci]"
